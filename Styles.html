<style>
/* =========================================================
 STYLE.CSS - GOOGLE WORKSPACE THEME (Projet Antigravity)
 ========================================================= */
:root {
/* Couleurs de base */
 --gw-primary: #1a73e8;
 --gw-primary-hover: #185abc;
 --gw-primary-light: #e8f0fe;
/* Textes et Fonds */
 --gw-text-main: #202124;
 --gw-text-muted: #5f6368;
 --gw-bg-main: #ffffff;
 --gw-bg-alt: #f8f9fa;
/* Structure */
 --gw-border: #dadce0;
 --gw-border-hover: #80868b;
/* Typographie */
 --gw-font-family: 'Roboto', 'Google Sans', Arial, sans-serif;
}

/* ── GLOBALS ── */
body {
  font-family: var(--gw-font-family);
  color: var(--gw-text-main);
  background-color: var(--gw-bg-main);
  font-size: 14px;
  line-height: 1.5;
  margin: 0;
  padding: 0;
}
h1, h2, h3, h4 {
  font-family: 'Google Sans', var(--gw-font-family);
  color: var(--gw-text-main);
  font-weight: 500;
}

/* ── BOUTONS (Bouton d'action et Bouton secondaire) ── */
.gw-btn {
  font-family: 'Google Sans', var(--gw-font-family);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.25px;
  padding: 8px 24px;
  border-radius: 4px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s, border 0.2s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-sizing: border-box;
  background-image: none !important; /* Force la suppression du gradient de add-ons1.css */
}
.gw-btn-primary {
  background: var(--gw-primary) !important;
  color: #ffffff !important;
  border: none !important;
}
.gw-btn-primary:hover {
  background: var(--gw-primary-hover) !important;
  box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
}
.gw-btn-primary:disabled {
  background: #e8eaed !important;
  color: #9aa0a6 !important;
  box-shadow: none;
  cursor: not-allowed;
}
.gw-btn-secondary {
  background: transparent !important;
  color: var(--gw-primary) !important;
  border: 1px solid var(--gw-border) !important;
}
.gw-btn-secondary:hover {
  background: rgba(26,115,232,0.04) !important;
  border-color: #d2e3fc !important;
}

/* ── CHAMPS DE SAISIE (Inputs & Selects) ── */
.gw-input {
  font-family: var(--gw-font-family);
  font-size: 14px;
  color: var(--gw-text-main);
  background-color: #ffffff;
  padding: 8px 12px;
  border: 1px solid var(--gw-border);
  border-radius: 4px;
  outline: none;
  transition: border 0.2s;
  width: 100%;
  box-sizing: border-box;
  height: 36px;
}
.gw-input:hover {
  border-color: var(--gw-border-hover);
}
.gw-input:focus {
  border: 2px solid var(--gw-primary);
  padding: 7px 11px; /* Maintient la taille malgré la bordure 2px */
}
.gw-input::placeholder {
  color: #9aa0a6;
}

/* Labels des formulaires */
.gw-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--gw-text-muted);
  margin-bottom: 6px;
}

/* ── CARTES ET CONTENEURS (Cards) ── */
.gw-card {
  background: var(--gw-bg-main);
  border: 1px solid var(--gw-border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 16px;
}

/* ── UTILS (Existants) ── */
body.dialog { padding: 20px; }
.block.form-group { margin-bottom: 16px; }
.row2 { display: flex; gap: 12px; }
.row2 > .block { flex: 1; }
.footer-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }
.material-symbols-outlined { font-size: 16px; }

.info-note {
  padding: 10px 14px;
  background: var(--gw-primary-light);
  border-left: 3px solid var(--gw-primary);
  border-radius: 4px;
  font-size: 13px;
  color: #1558d6;
  margin-top: 12px;
  line-height: 1.5;
}

.success-msg, .feedback {
  display: none;
  padding: 12px 16px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  margin-top: 14px;
  border-left: 3px solid;
  animation: fadeIn 0.25s ease;
}
.success-msg, .feedback.ok { background: #e6f4ea; color: #137333; border-color: #137333; }
.feedback.error { background: #fce8e6; color: #c5221f; border-color: #c5221f; }

.loading-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--gw-text-muted);
  padding: 8px 0;
}
.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(26,115,232,0.25);
  border-top-color: var(--gw-primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
}

/* ── SIDEBAR SPECIFIC ── */
.ws-header { padding: 12px 16px; border-bottom: 1px solid var(--gw-border); display: flex; align-items: center; gap: 10px; background: var(--gw-bg-main); }
.ws-header-icon { color: var(--gw-primary); font-size: 26px; line-height: 1; }
.ws-header-title { font-size: 15px; font-weight: 500; color: var(--gw-text-main); line-height: 1.2; }
.ws-header-sub { font-size: 11px; color: var(--gw-text-muted); margin-top: 1px; }

.lang-bar { padding: 6px 16px; background: var(--gw-bg-alt); border-bottom: 1px solid var(--gw-border); display: flex; align-items: center; gap: 6px; }
.lang-label { font-size: 11px; color: var(--gw-text-muted); }
.lang-chip { padding: 2px 10px; border-radius: 12px; font-size: 11px; cursor: pointer; border: 1px solid var(--gw-border); background: var(--gw-bg-main); color: var(--gw-text-muted); transition: all 0.15s; }
.lang-chip:hover { background: #f1f3f4; }
.lang-chip.active { background: var(--gw-primary-light); border-color: var(--gw-primary); color: var(--gw-primary); font-weight: 500; }

.ws-content { padding: 12px 16px 72px; }
.section-title { font-size: 11px; font-weight: 500; color: var(--gw-text-muted); text-transform: uppercase; letter-spacing: 0.6px; margin: 14px 0 8px; display: flex; align-items: center; gap: 6px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: #e8eaed; }

.domains-wrap { display: flex; flex-wrap: wrap; gap: 4px; }
.domain-chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 12px; font-size: 11px; background: var(--gw-primary-light); color: var(--gw-primary); border: 1px solid #c5d9fb; font-weight: 500; }
.domain-chip.warn { background: #fce8e6; color: #c5221f; border-color: #f5c6c5; }

.status-card { display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 500; color: var(--gw-text-main); }
.status-card .material-symbols-outlined { font-size: 22px; }
.status-card-p { font-size: 13px; color: var(--gw-text-muted); line-height: 1.6; margin: 0 0 18px; }

.risk-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.risk-title { font-size: 12px; font-weight: 500; color: var(--gw-text-muted); }
.risk-badge { font-size: 12px; font-weight: 700; padding: 1px 8px; border-radius: 10px; }
.risk-track { height: 6px; background: #e8eaed; border-radius: 3px; overflow: hidden; }
.risk-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
.risk-label { font-size: 12px; font-weight: 500; margin-top: 6px; text-align: center; }

.kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
.kpi-card { background: var(--gw-bg-main); border: 1px solid var(--gw-border); border-radius: 8px; padding: 10px 8px; text-align: center; }
.kpi-value { font-size: 22px; font-weight: 700; line-height: 1; margin-bottom: 3px; }
.kpi-lbl { font-size: 10px; color: var(--gw-text-muted); line-height: 1.3; }
.kpi-card.ok .kpi-value { color: #137333; }
.kpi-card.warn .kpi-value { color: #b06000; }
.kpi-card.danger .kpi-value { color: #c5221f; }
.kpi-card.info .kpi-value { color: var(--gw-primary); }

.log-box { display: none; background: var(--gw-bg-alt); border: 1px solid var(--gw-border); border-radius: 6px; padding: 6px 8px; max-height: 80px; overflow-y: auto; font-size: 10px; font-family: 'Roboto Mono', monospace; color: var(--gw-text-muted); margin-bottom: 8px; }
.log-line { padding: 1px 0; }
.log-ok { color: #137333; } .log-warn { color: #b06000; } .log-error { color: #c5221f; } .log-info { color: var(--gw-primary); }

.btn-full { width: 100%; margin-bottom: 6px; }
.btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; margin-bottom: 5px; }
.btn-grid button, .btn-tools button { font-size: 11px; padding: 6px 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.btn-tools { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; }
.ws-footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--gw-bg-alt); border-top: 1px solid var(--gw-border); padding: 6px 16px; font-size: 10px; color: #9aa0a6; text-align: center; }

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
</style>
