<body>

<!-- ══ HEADER ══════════════════════════════════════════ -->
<div class="ws-header">
  <span class="material-symbols-outlined ws-header-icon">security</span>
  <div>
    <div class="ws-header-title">Workspace Audit</div>
    <div class="ws-header-sub" id="headerSub">Chargement...</div>
  </div>
</div>

<!-- ══ LANG BAR ════════════════════════════════════════ -->
<div class="lang-bar">
  <span class="lang-label">Langue :</span>
  <button class="lang-chip" id="btnFr" onclick="setLang('fr')">🇫🇷 FR</button>
  <button class="lang-chip" id="btnEn" onclick="setLang('en')">🇬🇧 EN</button>
</div>

<!-- ══ CONTENT ═════════════════════════════════════════ -->
<div class="ws-content">

  <!-- Domaines -->
  <div class="section-title" data-i18n="section_domains">Domaines</div>
  <div class="domains-wrap" id="domainsList">
    <span class="domain-chip">—</span>
  </div>

  <!-- Risk bar -->
  <div id="riskContainer" style="display:none;">
    <div class="risk-card">
      <div class="risk-header">
        <span class="risk-title" data-i18n="dash_risk_score">Score de risque</span>
        <span class="risk-badge" id="riskBadge">—</span>
      </div>
      <div class="risk-track">
        <div class="risk-fill" id="riskFill" style="width:0%;"></div>
      </div>
      <div class="risk-label" id="riskLabel">—</div>
    </div>
  </div>

  <!-- KPIs -->
  <div id="kpiSection" style="display:none;">
    <div class="section-title" data-i18n="section_summary">Résumé</div>
    <div class="kpi-grid">
      <div class="kpi-card info">
        <div class="kpi-value" id="kpiTotalUsers">—</div>
        <div class="kpi-lbl" data-i18n="dash_total_users">Utilisateurs</div>
      </div>
      <div class="kpi-card" id="kpiNo2faCard">
        <div class="kpi-value" id="kpiNo2fa">—</div>
        <div class="kpi-lbl" data-i18n="dash_no_2fa">Sans 2FA</div>
      </div>
      <div class="kpi-card" id="kpiInactiveCard">
        <div class="kpi-value" id="kpiInactive">—</div>
        <div class="kpi-lbl" data-i18n="dash_inactive_users">Inactifs</div>
      </div>
      <div class="kpi-card" id="kpiSharesCard">
        <div class="kpi-value" id="kpiShares">—</div>
        <div class="kpi-lbl" data-i18n="dash_shared_ext">Partages ext.</div>
      </div>
      <div class="kpi-card" id="kpiOauthCard">
        <div class="kpi-value" id="kpiOauth">—</div>
        <div class="kpi-lbl" data-i18n="dash_oauth_apps">Apps OAuth</div>
      </div>
      <div class="kpi-card" id="kpiLoginCard">
        <div class="kpi-value" id="kpiLogin">—</div>
        <div class="kpi-lbl" data-i18n="dash_failed_logins">Échecs connexion</div>
      </div>
    </div>
  </div>

  <!-- Progress + Log -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">...</div>
  </div>
  <div class="log-box" id="statusLog"></div>

  <!-- Action principale -->
  <div class="section-title" data-i18n="section_actions">Actions</div>
  <button class="gw-btn gw-btn-primary btn-full" id="btnRunAll" onclick="runAll()">
    <span class="material-symbols-outlined">sync</span>
    <span data-i18n="menu_refresh_dash">Audit complet</span>
  </button>

  <!-- Modules -->
  <div class="section-title" data-i18n="section_modules">Modules</div>
  <div class="btn-grid">
    <button class="gw-btn gw-btn-secondary" onclick="runModule('Users')">
      <span class="material-symbols-outlined">person</span> <span data-i18n="menu_users">Utilisateurs</span>
    </button>
    <button class="gw-btn gw-btn-secondary" onclick="runModule('Groups')">
      <span class="material-symbols-outlined">group</span> <span data-i18n="menu_groups">Groupes</span>
    </button>
    <button class="gw-btn gw-btn-secondary" onclick="runModule('Drive')">
      <span class="material-symbols-outlined">folder_open</span> <span data-i18n="menu_drive">Drive</span>
    </button>
    <button class="gw-btn gw-btn-secondary" onclick="runModule('Security')">
      <span class="material-symbols-outlined">lock</span> <span data-i18n="menu_security">Sécurité</span>
    </button>
    <button class="gw-btn gw-btn-secondary" onclick="runModule('Logs')">
      <span class="material-symbols-outlined">receipt_long</span> <span data-i18n="menu_logs">Logs</span>
    </button>
    <button class="gw-btn gw-btn-secondary" onclick="runModule('Login')">
      <span class="material-symbols-outlined">key</span> <span data-i18n="menu_login">Connexions</span>
    </button>
    <button class="gw-btn gw-btn-secondary" onclick="runModule('Devices')">
      <span class="material-symbols-outlined">smartphone</span> <span data-i18n="menu_devices">Appareils Mobiles</span>
    </button>
    <button class="gw-btn gw-btn-secondary" onclick="runModule('DNS')">
      <span class="material-symbols-outlined">dns</span> <span data-i18n="menu_dns">DNS</span>
    </button>
  </div>

  <!-- Outils -->
  <div class="section-title" data-i18n="section_tools">Outils</div>
  <div class="btn-tools">
    <button class="gw-btn gw-btn-secondary" onclick="openConfig()">
      <span class="material-symbols-outlined">settings</span> <span data-i18n="menu_config">Config</span>
    </button>
    <button class="gw-btn gw-btn-secondary" onclick="openScheduler()">
      <span class="material-symbols-outlined">schedule_send</span> <span data-i18n="menu_scheduler">Planifier</span>
    </button>
  </div>

</div>

<!-- ══ FOOTER ══════════════════════════════════════════ -->
<div class="ws-footer">Workspace Audit v1.0 — Google Apps Script</div>

<script>
// ── État global ──────────────────────────────────────
let currentLang = 'fr';
let isRunning   = false;

// ── Dictionnaire i18n sidebar ────────────────────────
const UI = {
  fr: {
    section_domains   : 'Domaines audités',
    section_summary   : 'Résumé du dernier audit',
    section_actions   : 'Action principale',
    section_modules   : 'Modules individuels',
    section_tools     : 'Outils',
    menu_refresh_dash : 'Audit complet',
    menu_users        : 'Utilisateurs',
    menu_groups       : 'Groupes',
    menu_drive        : 'Drive',
    menu_security     : 'Sécurité',
    menu_logs         : 'Logs',
    menu_login        : 'Connexions',
    menu_devices      : 'Appareils',
    menu_dns          : 'DNS',
    menu_config       : 'Configuration',
    menu_scheduler    : 'Planifier',
    dash_risk_score   : 'Score de risque',
    dash_total_users  : 'Utilisateurs',
    dash_no_2fa       : 'Sans 2FA',
    dash_inactive_users: 'Inactifs (>90j)',
    dash_shared_ext   : 'Partages ext.',
    dash_oauth_apps   : 'Apps OAuth',
    dash_failed_logins: 'Échecs connexion',
    risk_low          : '✅ Risque faible',
    risk_moderate     : '⚠️ Risque modéré',
    risk_high         : '🚨 Risque élevé',
    running           : 'Audit en cours...',
    no_domains        : 'Aucun domaine configuré',
    configure_first   : 'Configurez les domaines via ⚙️ Configuration',
  },
  en: {
    section_domains   : 'Audited Domains',
    section_summary   : 'Last Audit Summary',
    section_actions   : 'Main Action',
    section_modules   : 'Individual Modules',
    section_tools     : 'Tools',
    menu_refresh_dash : 'Full Audit',
    menu_users        : 'Users',
    menu_groups       : 'Groups',
    menu_drive        : 'Drive',
    menu_security     : 'Security',
    menu_logs         : 'Admin Logs',
    menu_login        : 'Login Activity',
    menu_devices      : 'Devices',
    menu_dns          : 'DNS',
    menu_config       : 'Configuration',
    menu_scheduler    : 'Schedule',
    dash_risk_score   : 'Risk Score',
    dash_total_users  : 'Users',
    dash_no_2fa       : 'Without 2FA',
    dash_inactive_users: 'Inactive (>90d)',
    dash_shared_ext   : 'External Shares',
    dash_oauth_apps   : 'OAuth Apps',
    dash_failed_logins: 'Failed Logins',
    risk_low          : '✅ Low Risk',
    risk_moderate     : '⚠️ Moderate Risk',
    risk_high         : '🚨 High Risk',
    running           : 'Running audit...',
    no_domains        : 'No domains configured',
    configure_first   : 'Configure domains via ⚙️ Configuration',
  }
};

function i(key) { return (UI[currentLang] || UI.fr)[key] || key; }

// ── Init ─────────────────────────────────────────────
window.onload = () => {
  google.script.run
    .withSuccessHandler(initUI)
    .withFailureHandler(err => setHeaderSub('❌ ' + err.message))
    .getSidebarData();
};

function initUI(data) {
  if (!data) return;
  currentLang = data.lang || 'fr';
  updateLangButtons();
  updateI18n();

  const list = document.getElementById('domainsList');
  if (data.domains && data.domains.length > 0) {
    list.innerHTML = data.domains.map(d =>
      `<span class="domain-chip"><span class="material-symbols-outlined" style="font-size:12px;vertical-align:middle;">domain</span>${d}</span>`
    ).join('');
    setHeaderSub(data.domains.join(' · '));
  } else {
    list.innerHTML = `<span class="domain-chip warn">${i('configure_first')}</span>`;
    setHeaderSub(i('no_domains'));
  }

  if (data.metrics && data.metrics.totalUsers > 0) {
    displayMetrics(data.metrics);
  }
}

function setHeaderSub(text) {
  document.getElementById('headerSub').textContent = text;
}

// ── Langue ───────────────────────────────────────────
function setLang(lang) {
  currentLang = lang;
  updateLangButtons();
  updateI18n();
  google.script.run.saveConfig({ lang });
}

function updateLangButtons() {
  document.getElementById('btnFr').className = 'lang-chip' + (currentLang === 'fr' ? ' active' : '');
  document.getElementById('btnEn').className = 'lang-chip' + (currentLang === 'en' ? ' active' : '');
}

function updateI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = i(el.getAttribute('data-i18n'));
  });
}

// ── Audit complet ─────────────────────────────────────
function runAll() {
  if (isRunning) return;
  isRunning = true;
  setRunningState(true);
  showProgress(true);
  clearLog();

  const steps = [
    { fn: 'runAuditUsers',    key: 'menu_users',    pct: 12 },
    { fn: 'runAuditGroups',   key: 'menu_groups',   pct: 25 },
    { fn: 'runAuditDrive',    key: 'menu_drive',    pct: 38 },
    { fn: 'runAuditSecurity', key: 'menu_security', pct: 50 },
    { fn: 'runAuditLogs',     key: 'menu_logs',     pct: 62 },
    { fn: 'runAuditLogin',    key: 'menu_login',    pct: 75 },
    { fn: 'runAuditDevices',  key: 'menu_devices',  pct: 88 },
    { fn: 'runAuditDNS',      key: 'menu_dns',      pct: 98 },
  ];

  let idx = 0;
  function runNext() {
    if (idx >= steps.length) {
      setProgress(100, '✅ ' + (currentLang === 'fr' ? 'Audit terminé' : 'Audit complete'));
      addLog('✅ ' + (currentLang === 'fr' ? 'Terminé' : 'Done'), 'ok');
      setTimeout(() => {
        google.script.run
          .withSuccessHandler(data => {
            if (data && data.metrics) displayMetrics(data.metrics);
            isRunning = false;
            setRunningState(false);
            setTimeout(() => showProgress(false), 2000);
          })
          .withFailureHandler(err => {
            addLog('❌ ' + err.message, 'error');
            isRunning = false;
            setRunningState(false);
          })
          .getSidebarData(true);
      }, 500);
      return;
    }
    const step = steps[idx++];
    const label = i(step.key);
    setProgress(step.pct, label + '…');
    addLog('⏳ ' + label, 'info');
    google.script.run
      .withSuccessHandler(() => runNext())
      .withFailureHandler(err => { addLog('❌ ' + err.message, 'error'); runNext(); })
      [step.fn]();
  }
  runNext();
}

// ── Module individuel ─────────────────────────────────
function runModule(name) {
  if (isRunning) return;
  isRunning = true;
  const fnMap = {
    Users:'runAuditUsers', Groups:'runAuditGroups', Drive:'runAuditDrive',
    Security:'runAuditSecurity', Logs:'runAuditLogs', Login:'runAuditLogin',
    Devices:'runAuditDevices',
  };
  const fn = fnMap[name];
  if (!fn) return;
  showProgress(true);
  clearLog();
  setProgress(50, i('menu_' + name.toLowerCase()) + '…');
  addLog('⏳ ' + name, 'info');
  google.script.run
    .withSuccessHandler(() => {
      setProgress(100, '✅ ' + name);
      addLog('✅ ' + name, 'ok');
      isRunning = false;
      setTimeout(() => showProgress(false), 1500);
    })
    .withFailureHandler(err => {
      setProgress(100, '❌ ' + err.message);
      addLog('❌ ' + err.message, 'error');
      isRunning = false;
      setTimeout(() => showProgress(false), 3000);
    })
    [fn]();
}

// ── Config / Scheduler ───────────────────────────────
function openConfig()    { google.script.run.showConfigDialog(); }
function openScheduler() { google.script.run.showSchedulerDialog(); }

// ── Métriques ─────────────────────────────────────────
function displayMetrics(m) {
  if (!m) return;
  document.getElementById('kpiSection').style.display = '';
  document.getElementById('riskContainer').style.display = '';

  const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val ?? '—'; };
  const lvl = (val, t1, t2) => val === 0 ? 'ok' : val <= t1 ? 'warn' : 'danger';

  const total = m.totalUsers || 1;
  set('kpiTotalUsers', m.totalUsers  || 0);
  set('kpiNo2fa',      m.no2faUsers  || 0);
  set('kpiInactive',   m.inactiveUsers || 0);
  set('kpiShares',     m.externalShares || 0);
  set('kpiOauth',      m.oauthApps   || 0);
  set('kpiLogin',      m.failedLogins || 0);

  const setCard = (id, val, t1, t2) => {
    const c = document.getElementById(id);
    if (c) c.className = 'kpi-card ' + lvl(val, t1, t2);
  };
  setCard('kpiNo2faCard',   m.no2faUsers    || 0, Math.round(total * 0.1), Math.round(total * 0.3));
  setCard('kpiInactiveCard',m.inactiveUsers || 0, Math.round(total * 0.1), Math.round(total * 0.2));
  setCard('kpiSharesCard',  m.externalShares|| 0, 5, 20);
  setCard('kpiOauthCard',   m.oauthApps     || 0, 10, 30);
  setCard('kpiLoginCard',   m.failedLogins  || 0, 10, 50);

  // Score de risque
  const score = Math.min(100, Math.round(
    (m.no2faUsers    / total) * 30 +
    (m.inactiveUsers / total) * 20 +
    Math.min(20, (m.externalShares || 0) * 0.4) +
    Math.min(15, (m.oauthApps      || 0) * 0.5) +
    Math.min(15, (m.failedLogins   || 0) * 0.3)
  ));

  let color = '#137333', label = i('risk_low');
  if (score > 65)      { color = '#c5221f'; label = i('risk_high'); }
  else if (score > 30) { color = '#b06000'; label = i('risk_moderate'); }

  const fill  = document.getElementById('riskFill');
  const badge = document.getElementById('riskBadge');
  const lbl   = document.getElementById('riskLabel');
  fill.style.width      = score + '%';
  fill.style.background = color;
  badge.textContent       = score + '/100';
  badge.style.background  = color + '18';
  badge.style.color       = color;
  lbl.textContent         = label;
  lbl.style.color         = color;
}

// ── UI helpers ────────────────────────────────────────
function showProgress(show) {
  document.getElementById('progressWrap').style.display = show ? '' : 'none';
  document.getElementById('statusLog').style.display    = show ? '' : 'none';
}
function setProgress(pct, label) {
  document.getElementById('progressFill').style.width    = pct + '%';
  document.getElementById('progressLabel').textContent   = label || '';
}
function setRunningState(running) {
  const btn = document.getElementById('btnRunAll');
  btn.disabled = running;
  if (running) {
    btn.innerHTML = '<span class="spinner"></span>' + i('running');
  } else {
    btn.innerHTML =
      '<span class="material-symbols-outlined">sync</span> ' +
      '<span>' + i('menu_refresh_dash') + '</span>';
  }
}
function addLog(msg, type) {
  const log  = document.getElementById('statusLog');
  const line = document.createElement('div');
  line.className = 'log-line log-' + (type || 'info');
  line.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}
function clearLog() {
  document.getElementById('statusLog').innerHTML = '';
}
</script>
</body>
</html>
